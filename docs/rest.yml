openapi: 3.0.3
info:
  title: Handoff Generated API
  description: |
    REST-like API generated by Handoff and served from the static app's `public/api` directory.
    The docs app and component pages consume these endpoints. All routes are GET-only (static JSON,
    SVG, or binary assets). Base URL is the app origin plus optional `HANDOFF_APP_BASE_PATH`.
  version: 1.0.0

servers:
  - url: /
    description: App origin (with optional base path via HANDOFF_APP_BASE_PATH)

tags:
  - name: Components
    description: Component list and per-component data
  - name: Tokens
    description: Design tokens and documentation object
  - name: Assets
    description: Icons, logos, and sprite

paths:
  /api/components.json:
    get:
      tags: [Components]
      summary: List components
      description: |
        Returns the full list of component summaries (metadata, properties, previews). Used by the
        design system menu and component list page. Generated by the component pipeline.
      operationId: getComponentsList
      responses:
        '200':
          description: Array of component list entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComponentListEntry'

  /api/component/{id}.json:
    get:
      tags: [Components]
      summary: Get component by ID
      description: |
        Returns the full transform result for a single component (previews, properties, code,
        page definition, etc.). Used by component detail pages.
      operationId: getComponent
      parameters:
        - name: id
          in: path
          required: true
          description: Component identifier (e.g. button, card-row)
          schema:
            type: string
      responses:
        '200':
          description: Full component data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentDetail'
        '404':
          description: Component not found (file not present under public/api/component)

  /api/tokens.json:
    get:
      tags: [Tokens]
      summary: Get full documentation object
      description: |
        Returns the full documentation object (design tokens, local styles, components metadata,
        assets). Written by generateTokensApi from the documentation object. Optional; may be
        empty if no fetch/documentation has been run.
      operationId: getTokens
      responses:
        '200':
          description: Documentation object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentationObject'

  /api/tokens/{group}.json:
    get:
      tags: [Tokens]
      summary: Get tokens by group
      description: |
        Returns one group from the documentation object (e.g. color, typography from localStyles,
        or icons/logos from assets). Group name is the key under each top-level type.
      operationId: getTokensByGroup
      parameters:
        - name: group
          in: path
          required: true
          description: Group name (e.g. color, typography, icons, logos)
          schema:
            type: string
      responses:
        '200':
          description: Group data (structure depends on group)
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Group not found

  /api/assets/icons.json:
    get:
      tags: [Assets]
      summary: List icons
      description: List of icon assets (path, name, etc.) extracted from documentation.
      operationId: getIconsList
      responses:
        '200':
          description: Array of icon assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetEntry'

  /api/assets/logos.json:
    get:
      tags: [Assets]
      summary: List logos
      description: List of logo assets extracted from documentation.
      operationId: getLogosList
      responses:
        '200':
          description: Array of logo assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetEntry'

  /api/assets/icons/{path}:
    get:
      tags: [Assets]
      summary: Get icon file
      description: Raw icon file (e.g. SVG) by path. Path matches the asset's path from icons.json.
      operationId: getIconFile
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary file content
          content:
            image/svg+xml:
              schema:
                type: string
                format: binary
        '404':
          description: Not found

  /api/assets/logos/{path}:
    get:
      tags: [Assets]
      summary: Get logo file
      description: Raw logo file by path from logos.json.
      operationId: getLogoFile
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not found

  /api/icons-sprite.svg:
    get:
      tags: [Assets]
      summary: Get icons SVG sprite
      description: Combined SVG sprite of all extracted icons. Generated during documentation build.
      operationId: getIconsSprite
      responses:
        '200':
          description: SVG sprite
          content:
            image/svg+xml:
              schema:
                type: string

  /api/icons-sprite-manifest.json:
    get:
      tags: [Assets]
      summary: Get sprite manifest
      description: Manifest mapping icon names to sprite symbol IDs for use with the sprite.
      operationId: getIconsSpriteManifest
      responses:
        '200':
          description: Manifest object
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                  description: Symbol ID in the sprite

components:
  schemas:
    ComponentListEntry:
      type: object
      description: Summary entry for one component (from components.json).
      required: [id, path, title]
      properties:
        id:
          type: string
          description: Component identifier
        path:
          type: string
          description: Path to full data, e.g. /api/component/{id}.json
        title:
          type: string
        description:
          type: string
        image:
          type: string
        group:
          type: string
        type:
          type: string
          enum: [element, block, navigation, utility]
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        figma:
          type: string
        figmaComponentId:
          type: string
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SlotMetadata'
        previews:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PreviewEntry'

    SlotMetadata:
      type: object
      description: Property/slot metadata (name, type, description, rules, etc.).
      properties:
        type:
          type: string
        name:
          type: string
        description:
          type: string
        default:
          type: string
        options:
          type: array
        items:
          $ref: '#/components/schemas/SlotMetadata'
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SlotMetadata'
        rules:
          type: object

    PreviewEntry:
      type: object
      properties:
        title:
          type: string
        values:
          type: object
        url:
          type: string

    ComponentDetail:
      type: object
      description: Full transform result for one component (from api/component/{id}.json).
      properties:
        id:
          type: string
        type:
          type: string
          enum: [element, block, navigation, utility]
        title:
          type: string
        description:
          type: string
        group:
          type: string
        image:
          type: string
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        figma:
          type: string
        figmaComponentId:
          type: string
        should_do:
          type: array
          items:
            type: string
        should_not_do:
          type: array
          items:
            type: string
        format:
          type: string
        code:
          type: string
        html:
          type: string
        preview:
          type: string
        js:
          type: string
        css:
          type: string
        sass:
          type: string
        sharedStyles:
          type: string
        previews:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PreviewEntry'
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SlotMetadata'
        variant:
          type: object
        entries:
          type: object
          properties:
            js:
              type: string
            scss:
              type: string
            template:
              type: string
            schema:
              type: string
        options:
          type: object
        validations:
          type: object
        page:
          $ref: '#/components/schemas/PageDefinition'
        docgen:
          type: object

    PageDefinition:
      type: object
      properties:
        slices:
          type: array
          items:
            type: object
            required: [type]
            properties:
              type:
                type: string
                enum:
                  - BEST_PRACTICES
                  - COMPONENT_DISPLAY
                  - VALIDATION_RESULTS
                  - PROPERTIES
                  - TEXT
                  - CARDS
        options:
          type: object

    DocumentationObject:
      type: object
      description: Full documentation object (tokens.json). Shape from handoff-core IDocumentationObject.
      properties:
        timestamp:
          type: string
          format: date-time
        localStyles:
          type: object
          description: Design tokens by category (e.g. color, typography, effect)
        components:
          type: object
        assets:
          type: object
          properties:
            icons:
              type: array
            logos:
              type: array

    AssetEntry:
      type: object
      description: Single asset (icon or logo) with path and metadata.
      properties:
        path:
          type: string
        name:
          type: string
